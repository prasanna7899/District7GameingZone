<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>District D7 Gaming Zone</title>
<link rel="stylesheet" href="css/style.css"></head>
<body>
<header><h1>District D7 Gaming Zone</h1><p>2nd Bus Stop, P.M Palem, SBI Colony, Pothinamallayya Palem, Andhra Pradesh 530041</p></header>
<nav><a href="#about">About</a><a href="#booking">Booking</a><a href="#contact">Contact</a></nav>
<section class="hero"><h2>Level Up Your Game</h2><button onclick="document.getElementById('booking').scrollIntoView()">Book Now</button></section>
<section id="about"><h2>Hours</h2><ul>
<li>Tuesday–Sunday: 10:00 AM – 9:30 PM</li>
<li>Monday: Closed (Open on Public Holidays)</li></ul></section>
<section id="booking">
<h2>Book a Slot</h2>
<form id="bookForm">
<label>Date<input type="date" required></label>
<label>Game<select><option>PS5</option><option>Gaming PC</option><option>VR</option><option>Snooker</option></select></label>
<label>Start Time<input type="time" min="10:00" max="21:30" required></label>
<label>Duration<select><option>1 Hour</option><option>2 Hour</option><option>3 Hour</option><option>4 Hour</option><option>5 Hour</option><option>6 Hour</option><option>7 Hour</option><option>8 Hour</option></select></label>
<label>Name<input type="text" required></label>
<label>Phone<input type="tel" required></label>
<button>Reserve</button></form><p id="msg"></p></section>
<section id="contact"><h2>Contact</h2><p>WhatsApp: +91-XXXXXXXXXX</p></section>
<script src="js/main.js"></script>
</body></html>
